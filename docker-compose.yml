version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: src-audit-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: src_audit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: src-audit-redis
    restart: always
    ports:
      - "6379:6379"

  webhook-server:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: src-audit-webhook
    command: npm run dev:webhook
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: src-audit-worker
    command: npm run dev:worker
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis

  portal:
    build:
      context: ./apps/portal
    container_name: src-audit-portal
    ports:
      - "5173:5173"
    env_file: .env
    depends_on:
      - webhook-server

volumes:
  postgres_data:
