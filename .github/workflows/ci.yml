name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint portal
        working-directory: apps/portal
        run: npm run lint

  build-portal:
    name: Build Portal
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build portal
        working-directory: apps/portal
        run: npm run build

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t src-audit-backend:test .

      - name: Build portal image
        run: docker build -f apps/portal/Dockerfile -t src-audit-portal:test ./apps/portal
